name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to reviewed commit SHAs so a repointed upstream tag can't change the
      # code this workflow executes; the trailing comment records the tag each SHA was reviewed at.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PACKAGE_VERSION" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm lint
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build
